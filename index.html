<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/cf372e492c.js"
      crossorigin="anonymous"
    ></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
      integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2"
      crossorigin="anonymous"
    />
    <script type="module" src="todo.js"></script>
    <title>To-Do App</title>
  </head>
  <body>
    <h1 class="mainHeading">My To-Do List</h1>
    <input
      id="userIn"
      class="mainInputField form-control w-75 p-4"
      type="text"
      placeholder="Enter Your Task"
    />
    <br />
    <button id="addBtn" class="btn btn-outline-danger p-2 addBtn">
      Add Task
    </button>
    <br />
    <div class="listOfTasks w-75">
      <h4>My List</h4>
      <br />

      <ul id="root"></ul>
    </div>
    
    </div>
  </body>
</html>
